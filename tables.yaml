# tabelas e colunas a extrair do SAP HANA
# formato:
#
# NOME_TABELA:
#   tipo: tabela | view
#   estrategia: incremental_upsert | incremental_append | full_reload
#   chave_primaria:
#     - COLUNA_PK
#   coluna_watermark: COLUNA_DATA
#   carga_inicial:
#     inicio: "YYYY-MM-DD"   # null = sem filtro de data
#     fim: "YYYY-MM-DD"      # null = sem filtro de data
#     janela_meses: 3        # null = carrega tudo de uma vez
#   colunas:
#     - COLUNA1
#     - COLUNA2
#
# tabelas com @ no nome precisam de aspas:
#
# "@NOME_TABELA":
#   tipo: tabela
#   ...

OINV:
  tipo: tabela
  estrategia: incremental_upsert
  chave_primaria:
