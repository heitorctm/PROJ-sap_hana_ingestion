# tabelas e colunas a extrair do SAP HANA
# formato:
#
# NOME_TABELA:
#   tipo: tabela | view
#   estrategia: incremental_upsert | incremental_append | full_reload
#   chave_primaria:
#     - COLUNA_PK          # pode ser composta (lista de colunas)
#   coluna_watermark: COLUNA_DATA   # coluna usada para detectar registros novos/alterados
#   colunas:
#     - COLUNA1
#     - COLUNA2
#
# tabelas com @ no nome precisam de aspas:
#
# "@NOME_TABELA":
#   tipo: tabela
#   ...

OINV:
  tipo: tabela
  estrategia: incremental_upsert
  chave_primaria:
    - DocEntry
  coluna_watermark: UpdateDate
  colunas:
    - DocEntry
    - UpdateDate
    - BPLName
    - CANCELED
    - CardCode
    - CardName
    - Comments
    - DocDate
    - DocNum
    - Serial
    - SlpCode
    - U_chamadoSults
    - U_KITCARGA
    - U_Loja
    - U_PROTESTO

