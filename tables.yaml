# tabelas e colunas a extrair do SAP HANA
# formato:
#
# NOME_TABELA:
#   tipo: tabela
#   colunas:
#     - COLUNA1
#     - COLUNA2
#
# para views usar tipo: view
# tabelas com @ no nome precisam de aspas:
#
# "@NOME_TABELA":
#   tipo: tabela
#   colunas:
#     - COLUNA1
#
